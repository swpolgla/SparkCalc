name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run Tests
        run: |
          xcodebuild \
            -project sparkcalc.xcodeproj \
            -scheme sparkcalc \
            -destination 'platform=macOS' \
            test \
            | xcbeautify
